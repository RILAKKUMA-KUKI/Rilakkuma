<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鬆弛熊圖鑑 v6.3</title>
    <style>
        :root { --h-blue: #4fd1ed; --bg-cream: #fefddd; --purple: #554477; --brown: #5c4a3d; --border: #e8e8e8; }
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: white; border-bottom: 1px solid var(--border); position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .logo { font-size: 16px; font-weight: bold; color: var(--purple); }

        /* 側邊欄多級選單 */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: white; z-index: 3000; transition: 0.3s; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 12px 0; border-bottom: 1px solid #f9f9f9; color: var(--purple); font-weight: bold; }
        .sub-item { padding: 10px 20px; font-size: 14px; color: #666; border-bottom: 1px dotted #eee; }

        /* 搜尋區 */
        .hero { background: var(--h-blue); padding: 75px 15px 20px; text-align: center; }
        .search-container { display: flex; flex-direction: column; gap: 8px; width: 95%; margin: 0 auto 15px; }
        .search-box { background: white; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; }
        .search-box input { border: none; outline: none; flex: 1; font-size: 14px; }
        
        /* 輪播 */
        .carousel { width: 100%; aspect-ratio: 16/10; background: #fff; border-radius: 12px; overflow: hidden; position: relative; }
        .carousel-img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transition: 0.5s; top:0; left:0; }
        .carousel-img.active { opacity: 1; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 8px; font-size: 12px; }

        /* 黃色區域加大 */
        .profile { background: var(--bg-cream); padding: 50px 20px; text-align: center; color: var(--brown); }
        .scrolling-track { display: flex; gap: 20px; animation: scroll 30s linear infinite; width: max-content; }
        .scrolling-track img { width: 180px; height: 180px; border-radius: 15px; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }

        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--purple); color: #fff; border-radius: 50%; border: none; font-size: 32px; z-index: 1500; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; }
        .overlay.active { display: block; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; width: 92%; max-height: 90%; border-radius: 20px; z-index: 4000; display: none; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .modal.active { display: block; }

        /* 多圖預覽 */
        .media-preview { display: flex; gap: 10px; overflow-x: auto; margin: 10px 0; }
        .media-preview img, .media-preview video { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <div onclick="toggleSidebar(true)" style="font-size:24px;">☰</div>
        <div class="logo"> 鬆弛熊圖鑑 </div>
        <div style="font-size:20px;">🐻</div>
    </div>

    <div class="sidebar" id="sb">
        <h2 style="color:var(--purple)">分類目錄</h2>
        <div id="cateMenu" style="flex-grow:1; overflow-y:auto;"></div>
        <button onclick="closeAll()" style="width:100%; padding:12px; background:#f0f0f0; border:none; border-radius:8px;">關閉</button>
    </div>

    <div class="overlay" id="ov" onclick="closeAll()"></div>

    <div class="hero">
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="sk" placeholder="搜尋名稱..." oninput="doSearch()">
                <span>🔍</span>
            </div>
            <input type="date" id="sd" onchange="doSearch()" style="margin:0; padding:8px; height:38px;">
        </div>
        <div class="carousel" id="cp"></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="profile">
        <div style="font-size:24px; font-weight:bold; margin-bottom:15px;">Rilakkuma™</div>
        <div style="font-size:14px; line-height:1.8; margin-bottom:30px;">リラックマはいつもごゆるり...</div>
        <div style="overflow:hidden;"><div class="scrolling-track" id="st"></div></div>
    </div>

    <button class="fab" onclick="openAdd()">+</button>

    <div class="modal" id="formM">
        <h2 id="formT">加入資料</h2>
        <input type="hidden" id="editId">
        <input type="text" id="fn" placeholder="名稱">
        <input type="date" id="fd">
        <select id="fs"></select>
        <textarea id="fdesc" placeholder="簡介" rows="3"></textarea>
        <label style="font-size:12px;">上傳圖片 (可多選)</label>
        <input type="file" id="fi" accept="image/*" multiple>
        <label style="font-size:12px;">上傳影片 (一個)</label>
        <input type="file" id="fv" accept="video/*">
        <button onclick="handleSave()" style="width:100%; padding:15px; background:var(--purple); color:#fff; border:none; border-radius:10px; font-weight:bold;">儲存資料</button>
    </div>

    <div class="modal" id="dtM">
        <div id="dtC"></div>
        <div id="dtMedia" style="margin-top:15px;"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="editBtn" style="flex:1; padding:12px; border:1px solid var(--purple); color:var(--purple); background:none; border-radius:8px;">編輯資料</button>
            <button onclick="closeAll()" style="flex:1; padding:12px; background:#f0f0f0; border:none; border-radius:8px;">關閉</button>
        </div>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('bear_v63')) || [];
        // 定義多級分類數據
        const structure = {
            "鬆弛熊": ["全部鬆弛熊", "黑白系列", "20週年系列", "經典系列"],
            "小白熊": ["全部小白熊", "草莓系列", "貓咪系列"],
            "毛公仔": ["掛件", "S號公仔", "大型公仔"],
            "生活雜貨": ["文具", "餐具", "袋類"]
        };
        let curSlide = 0;

        function init() {
            const menu = document.getElementById('cateMenu');
            const select = document.getElementById('fs');
            menu.innerHTML = '<div class="sidebar-item" onclick="filter(\'all\')">顯示全部收藏</div>';
            select.innerHTML = '';

            for (let main in structure) {
                menu.innerHTML += `<div class="sidebar-item">▼ ${main}</div>`;
                structure[main].forEach(sub => {
                    menu.innerHTML += `<div class="sub-item" onclick="filter('${sub}')">${sub}</div>`;
                    select.innerHTML += `<option value="${sub}">${main} - ${sub}</option>`;
                });
            }
            render();
        }

        async function handleSave() {
            const id = document.getElementById('editId').value;
            const newItem = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('fn').value,
                date: document.getElementById('fd').value,
                cate: document.getElementById('fs').value,
                desc: document.getElementById('fdesc').value,
                images: id ? items.find(x => x.id == id).images : [],
                video: id ? items.find(x => x.id == id).video : null
            };

            const imgFiles = document.getElementById('fi').files;
            if(imgFiles.length > 0) {
                newItem.images = await Promise.all([...imgFiles].map(f => toBase64(f)));
            }
            const vidFile = document.getElementById('fv').files[0];
            if(vidFile) newItem.video = await toBase64(vidFile);

            if(!newItem.name || newItem.images.length == 0) return alert('請填寫名稱並上傳至少一張圖');

            if(id) {
                const idx = items.findIndex(x => x.id == id);
                items[idx] = newItem;
            } else {
                items.unshift(newItem);
            }
            localStorage.setItem('bear_v63', JSON.stringify(items));
            location.reload();
        }

        function render(list = items) {
            document.getElementById('grid').innerHTML = list.map(b => `
                <div class="card" onclick="showDetail(${b.id})">
                    <img src="${b.images[0]}">
                    <div class="card-info"><b>${b.name}</b><br><small>${b.date}</small></div>
                </div>`).join('');
            
            if(items.length > 0) {
                document.getElementById('cp').innerHTML = items.slice(0,5).map((b,i) => 
                    `<img src="${b.images[0]}" class="carousel-img ${i==0?'active':''}" onclick="showDetail(${b.id})">`).join('');
                document.getElementById('st').innerHTML = [...items, ...items].map(b => `<img src="${b.images[0]}">`).join('');
            }
        }

        function showDetail(id) {
            const b = items.find(x => x.id === id);
            let mediaHTML = b.images.map(img => `<img src="${img}" style="width:100%; border-radius:10px; margin-bottom:10px;">`).join('');
            if(b.video) mediaHTML += `<video src="${b.video}" controls style="width:100%; border-radius:10px;"></video>`;

            document.getElementById('dtC').innerHTML = `
                <h2 style="color:var(--purple);margin-bottom:5px;">${b.name}</h2>
                <p style="font-size:12px;color:#999;">日期：${b.date} | 分類：${b.cate}</p>
                <div style="background:#f9f9f9;padding:15px;border-radius:10px;font-size:14px;line-height:1.6;white-space:pre-wrap;">${b.desc || '無簡介'}</div>
                <div style="margin-top:15px;">${mediaHTML}</div>
                <button onclick="deleteItem(${b.id})" style="width:100%;color:red;background:none;border:none;margin-top:15px;font-size:12px;">🗑️ 刪除此項</button>
            `;
            document.getElementById('editBtn').onclick = () => openEdit(b);
            document.getElementById('dtM').classList.add('active');
            document.getElementById('ov').classList.add('active');
        }

        function openEdit(item) {
            document.getElementById('dtM').classList.remove('active');
            document.getElementById('formT').innerText = "編輯資料";
            document.getElementById('editId').value = item.id;
            document.getElementById('fn').value = item.name;
            document.getElementById('fd').value = item.date;
            document.getElementById('fs').value = item.cate;
            document.getElementById('fdesc').value = item.desc;
            document.getElementById('formM').classList.add('active');
        }

        function doSearch() {
            const key = document.getElementById('sk').value.toLowerCase();
            const date = document.getElementById('sd').value;
            const filtered = items.filter(b => {
                const matchK = b.name.toLowerCase().includes(key);
                const matchD = date ? b.date === date : true;
                return matchK && matchD;
            });
            render(filtered);
        }

        function filter(c) {
            render(c === 'all' ? items : items.filter(b => b.cate === c));
            toggleSidebar(false);
        }

        function toggleSidebar(s) {
            document.getElementById('sb').classList.toggle('active', s);
            document.getElementById('ov').classList.toggle('active', s);
        }

        function openAdd() {
            document.getElementById('formT').innerText = "加入資料";
            document.getElementById('editId').value = "";
            document.getElementById('formM').classList.add('active');
            document.getElementById('ov').classList.add('active');
        }

        function closeAll() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('ov').classList.remove('active');
            toggleSidebar(false);
        }

        function deleteItem(id) {
            if(confirm('確定刪除？')) {
                items = items.filter(x => x.id !== id);
                localStorage.setItem('bear_v63', JSON.stringify(items));
                location.reload();
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        setInterval(() => {
            const imgs = document.querySelectorAll('.carousel-img');
            if(imgs.length < 2) return;
            imgs[curSlide].classList.remove('active');
            curSlide = (curSlide + 1) % imgs.length;
            imgs[curSlide].classList.add('active');
        }, 5000);

        init();
    </script>
</body>
</html>
