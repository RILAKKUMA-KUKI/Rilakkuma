<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鬆弛熊圖鑑 - 穩定版</title>
    <style>
        :root { --h-blue: #4fd1ed; --bg-cream: #fefddd; --purple: #554477; --brown: #5c4a3d; --border: #e8e8e8; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #fff; margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* 頂部導覽 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: white; border-bottom: 1px solid var(--border); position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .header .logo { font-size: 16px; font-weight: bold; color: var(--purple); }
        .menu-icon { font-size: 24px; cursor: pointer; color: var(--purple); padding: 5px; }

        /* 側邊欄樣式 */
        .sidebar { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; background: white; z-index: 3000; transition: 0.3s; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 15px 0; border-bottom: 1px solid var(--border); color: var(--purple); display: flex; justify-content: space-between; align-items: center; }
        .del-cate { color: #ff4444; font-size: 12px; }

        /* 遮罩 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; }
        .overlay.active { display: block; }

        /* 首頁內容區 */
        .hero { background: var(--h-blue); padding: 70px 0 20px; text-align: center; }
        .carousel { width: 90%; aspect-ratio: 16/10; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; position: relative; }
        .carousel-img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transition: 0.5s; top:0; left:0; }
        .carousel-img.active { opacity: 1; }
        
        .products-title { padding: 15px; font-size: 24px; font-weight: bold; color: var(--purple); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px 80px; }
        .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-info { padding: 8px; }

        /* 角色簡介 (圖二風) */
        .profile { background: var(--bg-cream); padding: 40px 15px; text-align: center; color: var(--brown); }
        .scrolling-track { display: flex; gap: 10px; animation: scroll 20s linear infinite; width: max-content; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* 懸浮按鈕 */
        .fab { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; background: var(--purple); color: #fff; border-radius: 50%; border: none; font-size: 28px; z-index: 1500; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* 彈窗 */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; width: 90%; max-height: 85%; border-radius: 15px; z-index: 4000; display: none; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .modal.active { display: block; }
        .modal input, .modal textarea, .modal select { width: 100%; margin: 8px 0; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-icon" onclick="toggleSidebar(true)">☰</div>
        <div class="logo">鬆弛熊</div>
        <div style="font-size: 20px;">👤</div>
    </div>

    <div class="sidebar" id="sb">
        <h2 style="color:var(--purple)">分類目錄</h2>
        <div id="cateList" style="flex-grow:1; overflow-y:auto;"></div>
        <div style="padding-top:15px; border-top:1px solid var(--border);">
            <input type="text" id="newCate" placeholder="新分類名稱" style="width:70%; padding:8px;">
            <button onclick="addCate()" style="padding:8px; background:var(--purple); color:#fff; border:none; border-radius:5px;">新增</button>
        </div>
        <button onclick="toggleSidebar(false)" style="margin-top:15px; width:100%; padding:10px; border:none; background:#eee; border-radius:8px;">關閉</button>
    </div>

    <div class="overlay" id="ov" onclick="closeAll()"></div>

    <div class="hero">
        <div class="carousel" id="cp" onclick="openTopDetail()"></div>
        <p style="font-size: 11px; color:#fff; margin-top:8px;">每 5 秒自動切換 · 點擊查看詳情</p>
    </div>

    <div class="products-title" id="viewTitle">全部收藏</div>
    <div class="grid" id="grid"></div>

    <div class="profile">
        <div style="font-size:24px; font-weight:bold; margin-bottom:15px;">Rilakkuma™</div>
        <div style="font-size:14px; line-height:1.8; margin-bottom:20px;">リラックマはいつもごゆるり...</div>
        <div style="overflow:hidden;"><div class="scrolling-track" id="st"></div></div>
    </div>

    <button class="fab" onclick="openAdd()">+</button>

    <div class="modal" id="addM">
        <h2>➕ 加入收藏</h2>
        <input type="text" id="n" placeholder="名稱 (例如: 櫻花限定)">
        <select id="sCate"></select>
        <textarea id="d" placeholder="文字簡介..." rows="3"></textarea>
        <input type="file" id="i" accept="image/*">
        <button onclick="save()" style="width:100%; padding:12px; background:var(--purple); color:#fff; border:none; border-radius:8px; margin-top:10px;">儲存</button>
    </div>

    <div class="modal" id="dtM">
        <div id="dtC"></div>
        <button onclick="closeAll()" style="width:100%; padding:10px; margin-top:10px; border:none; background:#eee; border-radius:8px;">返回列表</button>
    </div>

    <script>
        let bears = JSON.parse(localStorage.getItem('bear_v61')) || [];
        let cates = JSON.parse(localStorage.getItem('cate_v61')) || ['全部商品', '毛公仔', '文具'];
        let curSlide = 0;

        // 初始化
        function init() {
            const cl = document.getElementById('cateList');
            const sc = document.getElementById('sCate');
            cl.innerHTML = ''; sc.innerHTML = '';
            cates.forEach((c, idx) => {
                cl.innerHTML += `<div class="sidebar-item"><span onclick="filter('${c}')">${c}</span>${idx>0?`<span class="del-cate" onclick="delCate('${c}')">❌</span>`:''}</div>`;
                if(idx>0) sc.innerHTML += `<option value="${c}">${c}</option>`;
            });
            render();
        }

        function toggleSidebar(show) {
            document.getElementById('sb').classList.toggle('active', show);
            document.getElementById('ov').classList.toggle('active', show);
        }

        function addCate() {
            const val = document.getElementById('newCate').value.trim();
            if(val && !cates.includes(val)) {
                cates.push(val);
                localStorage.setItem('cate_v61', JSON.stringify(cates));
                init();
                document.getElementById('newCate').value = '';
            }
        }

        function delCate(c) {
            if(confirm('確定刪除分類？')) {
                cates = cates.filter(x => x !== c);
                localStorage.setItem('cate_v61', JSON.stringify(cates));
                init();
            }
        }

        function save() {
            const n = document.getElementById('n').value;
            const c = document.getElementById('sCate').value;
            const d = document.getElementById('d').value;
            const f = document.getElementById('i').files[0];
            if(!n || !f) return alert('請填寫名稱並上傳圖片');

            const r = new FileReader();
            r.onload = e => {
                bears.unshift({ id: Date.now(), name: n, cate: c, desc: d, img: e.target.result });
                localStorage.setItem('bear_v61', JSON.stringify(bears));
                location.reload();
            };
            r.readAsDataURL(f);
        }

        function render(list = bears) {
            document.getElementById('grid').innerHTML = list.map(b => `<div class="card" onclick="openDetail(${b.id})"><img src="${b.img}"><div class="card-info"><b>${b.name}</b></div></div>`).join('');
            
            // 輪播 & 滾動
            const top3 = bears.slice(0, 3);
            if(top3.length) {
                document.getElementById('cp').innerHTML = top3.map((b, i) => `<img src="${b.img}" class="carousel-img ${i==0?'active':''}">`).join('');
                document.getElementById('st').innerHTML = [...bears, ...bears].map(b => `<img src="${b.img}" style="width:100px; height:100px; border-radius:8px; object-fit:cover;">`).join('');
            }
        }

        function filter(c) {
            document.getElementById('viewTitle').innerText = c;
            render(c === '全部商品' ? bears : bears.filter(b => b.cate === c));
            toggleSidebar(false);
        }

        function openDetail(id) {
            const b = bears.find(x => x.id === id);
            document.getElementById('dtC').innerHTML = `<img src="${b.img}" style="width:100%; border-radius:10px;"><h2 style="color:var(--purple)">${b.name}</h2><p style="color:#666">${b.desc || '暫無簡介'}</p><p style="font-size:12px;color:#999">分類：${b.cate}</p><button onclick="delBear(${b.id})" style="color:red; background:none; border:none; width:100%; margin-top:20px;">🗑️ 刪除此收藏</button>`;
            document.getElementById('dtM').classList.add('active');
            document.getElementById('ov').classList.add('active');
        }

        function delBear(id) {
            if(confirm('確定刪除？')) {
                bears = bears.filter(x => x.id !== id);
                localStorage.setItem('bear_v61', JSON.stringify(bears));
                location.reload();
            }
        }

        function openAdd() {
            document.getElementById('addM').classList.add('active');
            document.getElementById('ov').classList.add('active');
        }

        function closeAll() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('ov').classList.remove('active');
            toggleSidebar(false);
        }

        // 自動輪播
        setInterval(() => {
            const imgs = document.querySelectorAll('.carousel-img');
            if(imgs.length < 2) return;
            imgs[curSlide].classList.remove('active');
            curSlide = (curSlide + 1) % imgs.length;
            imgs[curSlide].classList.add('active');
        }, 5000);

        init();
    </script>
</body>
</html>
